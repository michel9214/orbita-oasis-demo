<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déjanos tu Reseña | Órbita</title>
    <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍣</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* tema por defecto (handroll); se sobrescribe con data-tema */
            --brand: #ff4d00;
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1c1c1c;
            --border: #2a2a2a;
            --text: #e8e8e8;
            --muted: #666;
            --green: #25d366;
            --headlineFont: 'Bebas Neue', sans-serif;
        }
        body[data-tema="cafe"] {
            --brand: #8B1A1A;
            --bg: #FAF3E0;
            --surface: #F5ECD5;
            --card: #FFF8EE;
            --border: #E8D5B0;
            --text: #1A1A1A;
            --muted: #7A6040;
            --headlineFont: 'Playfair Display', serif;
        }
        body[data-tema="fuente"] {
            --brand: #F59E0B;
            --bg: #1A0F05;
            --surface: #2A1A0B;
            --card: #2F1F10;
            --border: #4A3220;
            --text: #F5DEB3;
            --muted: #B8956A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 80% 20%, color-mix(in srgb, var(--brand) 8%, transparent) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 20% 80%, color-mix(in srgb, var(--brand) 5%, transparent) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .page-wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 20px 60px; }
        header { padding: 36px 0 28px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
        .logo-text { font-family: var(--headlineFont); font-size: 2.4rem; letter-spacing: 3px; color: var(--brand); line-height: 1; }
        .logo-text span { color: var(--text); }
        header p { margin-top: 8px; color: var(--muted); font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }
        .section-title { font-family: var(--headlineFont); font-size: 2rem; letter-spacing: 2px; color: var(--text); margin-bottom: 6px; }
        .section-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
        .stars-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; display: block; }
        .stars-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .star-btn { background: none; border: none; font-size: 2.8rem; cursor: pointer; transition: transform 0.15s ease, filter 0.15s ease; filter: grayscale(1) brightness(0.4); line-height: 1; }
        .star-btn.active { filter: grayscale(0) brightness(1); transform: scale(1.1); }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
        input[type="text"], textarea { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s; resize: none; }
        input[type="text"]:focus, textarea:focus { border-color: var(--brand); }
        textarea { height: 120px; }
        .char-count { text-align: right; font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
        .btn-enviar { width: 100%; background: var(--brand); color: #fff; border: none; border-radius: 50px; padding: 18px; font-family: var(--headlineFont); font-size: 1.3rem; letter-spacing: 2px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 10px; }
        .btn-enviar:hover { opacity: 0.9; }
        .btn-enviar:active { transform: scale(0.98); }
        .btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }
        .accent-line { height: 2px; background: linear-gradient(90deg, transparent, var(--brand), transparent); border: none; margin: 30px 0; }
        .success-box { display: none; text-align: center; padding: 40px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; }
        .success-box .emoji { font-size: 3rem; margin-bottom: 16px; }
        .success-box h3 { font-family: var(--headlineFont); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 10px; color: var(--green); }
        .success-box p { color: var(--muted); font-size: 0.9rem; }
        .error-msg { color: var(--brand); font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        .shake { animation: shake 0.3s ease; }
        .back-link { display: block; text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 30px; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: var(--brand); }
    </style>
</head>
<body>
<div class="page-wrap">
    <header>
        <div class="logo-text" id="logo-text">🍣 HAND<span>ROLL</span></div>
        <p>Déjanos tu opinión</p>
    </header>

    <div id="form-section">
        <div class="section-title">Tu Reseña</div>
        <p class="section-sub" id="section-sub">Nos ayuda a mejorar cada rollo 🙌</p>

        <span class="stars-label">¿Cómo calificarías tu experiencia?</span>
        <div class="stars-row" id="stars">
            <button class="star-btn" onclick="selStar(1)">⭐</button>
            <button class="star-btn" onclick="selStar(2)">⭐</button>
            <button class="star-btn" onclick="selStar(3)">⭐</button>
            <button class="star-btn" onclick="selStar(4)">⭐</button>
            <button class="star-btn" onclick="selStar(5)">⭐</button>
        </div>

        <hr class="accent-line">

        <div class="field">
            <label>Tu nombre (o apodo)</label>
            <input type="text" id="nombre" placeholder="Ej: Camila R." maxlength="40">
        </div>
        <div class="field">
            <label>Tu comentario</label>
            <textarea id="comentario" placeholder="¿Qué te pareció? ¿Lo recomendarías?" maxlength="300" oninput="updateCount()"></textarea>
            <div class="char-count"><span id="count">0</span>/300</div>
        </div>

        <button class="btn-enviar" id="btn-enviar" onclick="enviarResena()">✅ PUBLICAR RESEÑA</button>
        <p class="error-msg" id="error-msg">Hubo un error al enviar. Intenta de nuevo.</p>
    </div>

    <div class="success-box" id="success-box">
        <div class="emoji">🎉</div>
        <h3>¡Gracias!</h3>
        <p>Tu reseña ya aparece en nuestra página.<br>¡Nos encanta saber tu opinión!</p>
    </div>

    <a id="back-link" class="back-link" href="index.html">← Volver al menú</a>
</div>

<script>
    const SUPABASE_URL = "https://uldqgxdmblhyqsnxenaz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoYXl6cWd6eGd6bHVhZmpocGRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODA2MjEsImV4cCI6MjA5MjQ1NjYyMX0.z2fEdAvskGkKDRlcO_IFRHvZnilLEoLQRrpUNGIJNhM";

    const TEMAS = {
        handroll: {
            favicon: '🍣',
            docTitle: 'Déjanos tu Reseña | Hand Roll Express',
            logoHtml: '🍣 HAND<span>ROLL</span>',
            placeholder: '¿Qué te pareció el hand roll? ¿Lo recomendarías?',
            subtitulo: 'Nos ayuda a mejorar cada rollo 🙌',
            volverHref: 'index.html'
        },
        cafe: {
            favicon: '☕',
            docTitle: 'Déjanos tu Reseña | Café Órbita',
            logoHtml: '☕ CAFÉ <span>ÓRBITA</span>',
            placeholder: '¿Qué te pareció el café? ¿Lo recomendarías?',
            subtitulo: 'Nos ayuda a preparar cada café mejor ☕',
            volverHref: 'cafe.html'
        },
        fuente: {
            favicon: '🍔',
            docTitle: 'Déjanos tu Reseña | Fuente de Soda Órbita',
            logoHtml: '🍔 FUENTE <span>DE SODA</span>',
            placeholder: '¿Qué te pareció tu sándwich? ¿Lo recomendarías?',
            subtitulo: 'Nos ayuda a mejorar cada pedido 🙌',
            volverHref: 'fuente.html'
        }
    };

    const params = new URLSearchParams(window.location.search);
    const sitioRaw = (params.get('sitio') || 'handroll').toLowerCase();
    const sitio = TEMAS[sitioRaw] ? sitioRaw : 'handroll';
    const tema = TEMAS[sitio];

    document.body.setAttribute('data-tema', sitio);
    document.title = tema.docTitle;
    document.getElementById('favicon').setAttribute(
        'href',
        "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>" + tema.favicon + "</text></svg>"
    );
    document.getElementById('logo-text').innerHTML = tema.logoHtml;
    document.getElementById('section-sub').textContent = tema.subtitulo;
    document.getElementById('comentario').setAttribute('placeholder', tema.placeholder);
    document.getElementById('back-link').setAttribute('href', tema.volverHref);

    let estrellas = 0;

    function selStar(val) {
        estrellas = val;
        document.querySelectorAll('.star-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i < val);
        });
    }

    function updateCount() {
        document.getElementById('count').textContent = document.getElementById('comentario').value.length;
    }

    function shake(el) { el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400); }

    async function enviarResena() {
        const nombre     = document.getElementById('nombre').value.trim();
        const comentario = document.getElementById('comentario').value.trim();
        const errorMsg   = document.getElementById('error-msg');
        const btn        = document.getElementById('btn-enviar');
        errorMsg.style.display = 'none';

        if (estrellas === 0)  { shake(document.getElementById('stars')); return; }
        if (!nombre)          { shake(document.getElementById('nombre')); document.getElementById('nombre').focus(); return; }
        if (!comentario)      { shake(document.getElementById('comentario')); document.getElementById('comentario').focus(); return; }

        btn.disabled = true;
        btn.textContent = 'Enviando...';

        try {
            const res = await fetch(SUPABASE_URL + '/rest/v1/resenas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    apikey: SUPABASE_KEY,
                    Authorization: 'Bearer ' + SUPABASE_KEY,
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify({ nombre, estrellas, comentario, sitio })
            });

            if (!res.ok) throw new Error('Error ' + res.status);

            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-box').style.display = 'block';

        } catch(e) {
            btn.disabled = false;
            btn.textContent = '✅ PUBLICAR RESEÑA';
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
